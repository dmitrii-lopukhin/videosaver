services:
  bot:
    build: ./bot
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      insta-resolver:
        condition: service_started
    restart: unless-stopped

  insta-resolver:
    build: ./insta-resolver
    env_file: .env
    volumes:
      - ./insta-resolver/sessions:/app/sessions
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
